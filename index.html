<!doctype html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FAFAF8" />
    <meta name="color-scheme" content="light" />

    <title>HumSafar — Premium Railway & Bus Booking</title>
    <meta
      name="description"
      content="HumSafar is a premium railway and intercity bus booking platform. Compare trains and buses, find the best fares, and book with expert assistance."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HumSafar — Premium Railway & Bus Booking" />
    <meta
      property="og:description"
      content="Compare trains and buses across India. Premium booking experience with expert human assistance."
    />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Design-system fonts:
        • Inter    → body / UI            (font-sans)
        • Fraunces → editorial headlines  (font-display, incl. navbar "HumSafar")
        • Great Vibes → calligraphy wordmark (preloader)
        • Dancing Script → calligraphy fallback
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Great+Vibes&family=Dancing+Script:wght@600;700&display=swap"
      rel="stylesheet"
    />


  </head>
  <body class="bg-surface-base text-content-primary font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
